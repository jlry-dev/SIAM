name: CI/CD Deploy

on:
  push:
    branches:
      - main  # runs deployment on main push

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Download dependencies
        working-directory: ./backend
        run: go mod download

      - name: Run tests
        working-directory: ./backend
        run: go test ./...

      - name: Build app
        working-directory: ./backend
        run: go build -o app .

      - name: Start server
        env:
          PORT: 8080
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          ./backend/app &
          sleep 10

      - name: Smoke test
        run: curl -f https://battle-ship-one-livid.vercel.app/health || exit 1
